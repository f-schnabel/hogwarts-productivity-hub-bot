{% extends "layout.html" %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
  <h1>{{ title }}</h1>
  <p style="color: var(--text-secondary); margin-top: 1rem; font-size: 1.1rem;">{{ message }}</p>
  <a href="/" style="display: inline-block; margin-top: 2rem; padding: 0.75rem 2rem; background: rgba(212, 168, 83, 0.15); border: 1px solid var(--accent-gold); border-radius: 12px; color: var(--accent-gold); text-decoration: none; font-family: Cinzel, serif;">Return Home</a>
</div>
{% endblock %}
